<!--                 Contact form 2                -->
<!-- ============================================ -->
<div class="maincontact">
    <div class="maincontainer">

    <h2> Enquire</h2> <br>
    <p>Fill out the form and we will get back to you within 24 hours</p> <br>
    <form name="contact" method="post" data-netlify="true">
  

       <div class="personname">

       <div class="name">
        <label for="Email">First Name</label>
        <input type="text" id="firstname" name="firstname" placeholder="First Name..">
       </div>

       <div class="name">
        <label for="Email">Last Name</label>
        <input type="text" id="lastname" name="lastname" placeholder="Last Name..">
       </div>
    </div>

       <div class="name">
      <label for="Email">Email Address</label>
      <input type="text" id="Email" name="EmailAddress" placeholder="Email Address..">
       </div>

  

      <label for="Enquiry">Enquiry</label>
      <select id="Enquiry" name="Enquiry">
        <option value="Animal">Animal</option>
        <option value="Human">Human</option>
        <option value="Abstract">Abstract</option>
      </select>
  
      <label for="subject">Subject</label>
      <textarea id="subject" name="subject" placeholder="Tell us about your enquiry.." style="height:200px"></textarea>
  
      <input class="button" type="submit" value="Submit">
      
    </form>
</div>
